<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5em 1em;
      background: #f8f9fa;
      min-height: 100vh;
    }

    h1 { font-size: 2em; margin-bottom: 0.75em; color: #222; }

    #status {
      font-size: 1.25em;
      font-weight: 600;
      margin-bottom: 1.25em;
      min-height: 1.6em;
      color: #333;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #fff;
      border: 2px solid #bbb;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3em;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.12s, transform 0.08s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #eef;
      transform: scale(1.04);
    }

    .cell.taken { cursor: default; }
    .cell.X { color: #d32f2f; }
    .cell.O { color: #1565c0; }

    #new-game {
      margin-top: 2em;
      padding: 0.65em 1.8em;
      font-size: 1em;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      background: #1565c0;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }

    #new-game:hover { background: #0d47a1; }
  </style>
</head>
<body>
  <h1>Tic-Tac-Toe</h1>
  <div id="status">Loading…</div>
  <div id="board"></div>
  <button id="new-game" onclick="newGame()">New Game</button>

  <script>
    async function fetchState() {
      const res = await fetch('/state');
      return res.json();
    }

    function render(state) {
      const boardEl = document.getElementById('board');
      const statusEl = document.getElementById('status');

      boardEl.innerHTML = '';
      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
          const val = state.board[r][c];
          const cell = document.createElement('div');
          cell.className = 'cell' + (val ? ' taken ' + val : '');
          cell.textContent = val || '';
          if (!val && !state.winner && !state.is_draw) {
            cell.addEventListener('click', () => makeMove(r, c));
          }
          boardEl.appendChild(cell);
        }
      }

      if (state.winner) {
        statusEl.textContent = `Player ${state.winner} wins!`;
      } else if (state.is_draw) {
        statusEl.textContent = "It's a draw!";
      } else {
        statusEl.textContent = `Player ${state.current_player}'s turn`;
      }
    }

    async function makeMove(row, col) {
      const res = await fetch('/move', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ row, col })
      });
      const data = await res.json();
      if (data.error) {
        alert(data.error);
      } else {
        render(data);
      }
    }

    async function newGame() {
      const res = await fetch('/new_game', { method: 'POST' });
      const data = await res.json();
      render(data);
    }

    fetchState().then(render).catch(err => {
      document.getElementById('status').textContent = 'Error: ' + err.message;
    });
  </script>
</body>
</html>
